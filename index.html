<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Казахский язык — Поисковик ответов</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d9dee8;
            --blue: #0e7490;
            --green-bg: #ecfdf5;
            --green: #047857;
            --shadow: 0 8px 22px rgba(31, 41, 55, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .wrap {
            width: min(960px, calc(100% - 28px));
            margin: 28px auto;
        }
        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
            color: var(--blue);
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 22px;
            font-size: 16px;
        }
        .search-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 17px;
            outline: none;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }
        .search:focus { border-color: var(--blue); }
        .kaz-panel {
            display: flex;
            gap: 8px;
            margin: 2px 2px 8px;
            flex-wrap: wrap;
        }
        .symbol-btn {
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            user-select: none;
            transition: all 0.15s;
        }
        .symbol-btn:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: #f0f9ff;
        }
        .counter {
            margin: 14px 2px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }
        .results { display: grid; gap: 12px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(31, 41, 55, 0.04);
        }
        .badge {
            display: inline-block;
            margin-bottom: 10px;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 700;
            background: #ecfeff;
            color: #0e7490;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .question {
            font-size: 16px;
            line-height: 1.5;
            font-weight: 650;
            margin-bottom: 12px;
        }
        .answer {
            color: var(--green);
            background: var(--green-bg);
            border-left: 4px solid #10b981;
            border-radius: 0 7px 7px 0;
            padding: 10px 14px;
            line-height: 1.45;
            font-size: 15px;
        }
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 40px 0;
            font-size: 16px;
        }
    </style>
</head>

        const searchInput = document.getElementById("search");
        const resultsSection = document.getElementById("results");
        const counterDiv = document.getElementById("counter");

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function normalizeKazakhText(str) {
            return str.toLowerCase()
                .replace(/ә/g, 'а')
                .replace(/і/g, 'ы')
                .replace(/ң/g, 'н')
                .replace(/ғ/g, 'г')
                .replace(/ү/g, 'у')
                .replace(/ұ/g, 'у')
                .replace(/қ/g, 'к')
                .replace(/ө/g, 'о');
        }

        function render() {
            const rawTerm = searchInput.value.trim();
            const term = rawTerm.toLowerCase();
            const normalizedTerm = normalizeKazakhText(rawTerm);

            const filtered = quizDatabase.filter(item => {
                if (!term) return true;

                const plainText = `${item.question} ${item.correct}`.toLowerCase();
                if (plainText.includes(term)) return true;

                const normalizedItemText = normalizeKazakhText(`${item.question} ${item.correct}`);
                return normalizedItemText.includes(normalizedTerm);
            });

            counterDiv.textContent = `Найдено: ${filtered.length}`;
            
            if (!filtered.length) {
                resultsSection.innerHTML = '<div class="empty">Ничего не найдено</div>';
                return;
            }

            resultsSection.innerHTML = filtered.map(item => `
                <article class="card">
                    <span class="badge">Казахский язык</span>
                    <div class="question">${escapeHtml(item.question)}</div>
                    <div class="answer"><strong>Ответ:</strong> ${escapeHtml(item.correct)}</div>
                </article>
            `).join("");
        }

        searchInput.addEventListener("input", render);
        render();

        window.insertSymbol = function(symbol) {
            const start = searchInput.selectionStart;
            const end = searchInput.selectionEnd;
            const text = searchInput.value;
            
            searchInput.value = text.substring(0, start) + symbol + text.substring(end);
            
            searchInput.focus();
            searchInput.selectionStart = searchInput.selectionEnd = start + symbol.length;
            
            render();
        };
    </script>
